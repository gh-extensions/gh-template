variables:
  - text: "What is the organization name?"
    name: template-org
    case: [camel, snake, kebab, pascal]
    scope: [path, content]
  - text: "What is the repository name?"
    name: template-api
    scope: [path, content]
    case: [camel, snake, kebab, pascal]
  - text: "What is the service name?"
    name: template
    scope: [path, content]
    case: [camel, snake, kebab, pascal]

# Glob patterns of files/dirs to leave untouched.
# Patterns without '/' match basenames anywhere; patterns with '/' match
# the path relative to the repo root.
ignore:
  - "*.tmpl"
  - "vendor/*"
